name: Build CodexBar
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.2
        run: |
          # Download and install Swift 6.2 toolchain
          SWIFT_VERSION="swift-6.2-RELEASE"
          SWIFT_PLATFORM="apple"
          SWIFT_ARCH="arm64"
          
          curl -sL "https://download.swift.org/swift-6.2-release/${SWIFT_PLATFORM}${SWIFT_ARCH}/${SWIFT_VERSION}/${SWIFT_VERSION}-${SWIFT_PLATFORM}${SWIFT_ARCH}.tar.gz" -o swift.tar.gz
          tar -xzf swift.tar.gz
          export PATH="$(pwd)/${SWIFT_VERSION}-${SWIFT_PLATFORM}${SWIFT_ARCH}/usr/bin:$PATH"
          
          # Verify version
          swift --version

      - name: Resolve dependencies
        run: |
          export PATH="$(pwd)/swift-6.2-RELEASE-apple-arm64/usr/bin:$PATH"
          swift package resolve

      - name: Build release
        run: |
          export PATH="$(pwd)/swift-6.2-RELEASE-apple-arm64/usr/bin:$PATH"
          swift build -c release

      - name: Package app
        run: |
          export PATH="$(pwd)/swift-6.2-RELEASE-apple-arm64/usr/bin:$PATH"
          if [ -f ./Scripts/package_app.sh ]; then
            CODEXBAR_SIGNING=adhoc ./Scripts/package_app.sh
          else
            echo "No package script found, uploading raw build"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexBar-custom
          path: |
            CodexBar.app
            .build/release/
          retention-days: 30
